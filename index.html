<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braille Workspace Element</title>
  <link rel="stylesheet" href="theme-black-gold.css">
</head>
<body>

  <div class="editor-wrapper">
    <h1>Custom Braille Workspace Element</h1>
    
    <braille-editor id="myBrailleEditor"></braille-editor>

    <div class="instructions">
      <p><strong>Sighted view:</strong> Three separate, clean columns displaying line numbers, text input, and custom metrics.</p>
      <p><strong>Braille Display tree:</strong> Intercepted data stream presents the left gutter, active line, and right gutter as a continuous, flat line text element without row panning.</p>
    </div>
  </div>

  <script src="braille-editor.js"></script>
  
  <script>
    const editorInstance = document.getElementById('myBrailleEditor');

    // Custom configuration rule running on the right margin tracking column
    editorInstance.setRightGutterFunction((lineText) => {
      if (lineText.length === 0) return "EMPTY";
      
      const words = lineText.trim().split(/\s+/).filter(Boolean).length;
      return `${words}w / ${lineText.length}c`;
    });
  </script>

</body>
</html>
